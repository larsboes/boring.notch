name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

# https://stackoverflow.com/a/72408109/6942800
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege: only needs to read code for building.
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: [^16]
    steps:
    - name: Code Checkout
      uses: actions/checkout@v6.0.2
    - uses: mxcl/xcodebuild@v3
      with:
        xcode: ${{ matrix.xcode }}
        platform: macOS
        scheme: boringNotch
        action: build
        verbosity: xcpretty
        upload-logs: always
        configuration: release

  test:
    name: Test
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: [^16]
    steps:
    - uses: actions/checkout@v4
    - uses: mxcl/xcodebuild@v3
      with:
        xcode: ${{ matrix.xcode }}
        platform: macOS
        scheme: boringNotch
        action: test
        verbosity: xcpretty
        upload-logs: always

  arch-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run architecture checks
      run: bash .github/scripts/arch-check.sh
